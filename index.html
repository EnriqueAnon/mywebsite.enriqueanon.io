<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background: #f8f9fa;
            padding-bottom: 50px;
        }
        .container {
            margin-top: 40px;
        }
        .card-header {
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h3 class="text-center mb-4">Student Registration System</h3>

    <div class="row">
        <div class="col-md-5">
            <div class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">Student Information</div>
                <div class="card-body">
                    <form id="studentForm">
                        <div class="mb-3">
                            <label class="form-label">Name</label>
                            <input type="text" id="name" name="name" class="form-control" placeholder="Enter full name" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Matric Number</label>
                            <input type="text" id="matric" name="matric" class="form-control" placeholder="13DIT..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Department</label>
                            <select id="department" name="department" class="form-select" required>
                                <option value="">Select Department</option>
                                <option>Jabatan Kejuruteraan Awam</option>
                                <option>Jabatan Kejuruteraan Elektrik</option>
                                <option>Jabatan Kejuruteraan Mekanikal</option>
                                <option>Jabatan Teknologi Maklumat & Komunikasi</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Course</label><br>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="course" id="dka" value="DKA">
                                <label class="form-check-label" for="dka">Diploma Kejuruteraan Awam</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="course" id="dke" value="DKE">
                                <label class="form-check-label" for="dke">Diploma Kejuruteraan Elektrik</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="course" id="dkm" value="DKM">
                                <label class="form-check-label" for="dkm">Diploma Kejuruteraan Mekanikal</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="course" id="ddt" value="DDT">
                                <label class="form-check-label" for="ddt">Diploma Teknologi Digital</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" name="email" class="form-control" placeholder="example@email.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" id="phone" name="phone" class="form-control" placeholder="012-3456789">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">Submit Record</button>
                            <button type="reset" class="btn btn-outline-secondary btn-sm">Clear Form</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white">Registered Students</div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Name</th>
                                <th>Matric</th>
                                <th>Course</th>
                                <th>Email</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <tr>
                                <td>ENRIQUE GLENN MICHAEL</td>
                                <td>13DIT24F1172</td>
                                <td class="badge bg-info text-dark mt-2">DDT</td>
                                <td>enrique@example.com</td>
                                <td>
                                    <button class="btn btn-warning btn-sm">Edit</button>
                                    <button class="btn btn-danger btn-sm" onclick="return confirm('Delete this record?')">Delete</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
